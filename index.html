<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Soft Focus</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07111f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, #10233d 0%, #07111f 60%, #03060b 100%);
      }

      body {
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
        color: #eef4ff;
      }

      #app {
        width: 100vw;
        min-height: 100vh;
      }

      .app-runtime-shell {
        position: relative;
        width: 100vw;
        min-height: 100vh;
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app-shell__card {
        width: min(100%, 560px);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(124, 198, 255, 0.16);
        background: rgba(20, 32, 51, 0.92);
        box-shadow: 0 24px 64px rgba(5, 8, 16, 0.35);
      }

      .app-shell__eyebrow {
        margin: 0 0 12px;
        color: #7cc6ff;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .app-shell__title {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.5rem);
        line-height: 1.1;
      }

      .app-shell__body {
        margin: 0;
        color: #d7e5fb;
        font-size: 1rem;
        line-height: 1.65;
      }

      .app-shell__list {
        margin: 20px 0 0;
        padding-left: 20px;
        color: #d7e5fb;
        line-height: 1.65;
      }

      .app-shell__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .app-shell__button {
        min-width: 44px;
        min-height: 44px;
        padding: 14px 18px;
        border: 0;
        border-radius: 18px;
        background: #7cc6ff;
        color: #0a1a2c;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .app-shell__button:focus-visible {
        outline: 3px solid rgba(124, 198, 255, 0.4);
        outline-offset: 3px;
      }

      .app-shell__button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .app-shell__status {
        margin-top: 16px;
        color: #aab9d3;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .app-shell__runtime {
        width: 100vw;
        min-height: 100vh;
      }

      .session-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        pointer-events: none;
      }

      .session-overlay--hidden {
        display: none;
      }

      .session-overlay__panel {
        width: min(100%, 560px);
        max-height: calc(100vh - 48px);
        overflow: auto;
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(124, 198, 255, 0.18);
        background: rgba(20, 32, 51, 0.96);
        box-shadow: 0 24px 64px rgba(5, 8, 16, 0.4);
        pointer-events: auto;
      }

      .session-overlay__eyebrow {
        margin: 0 0 12px;
        color: #7cc6ff;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .session-overlay__title {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 3vw, 2.25rem);
        line-height: 1.15;
      }

      .session-overlay__body,
      .session-overlay__prompt,
      .session-overlay__helper,
      .session-overlay__support {
        margin: 0;
        color: #d7e5fb;
        font-size: 1rem;
        line-height: 1.65;
      }

      .session-overlay__list {
        margin: 20px 0;
        padding-left: 20px;
        color: #d7e5fb;
        line-height: 1.65;
      }

      .session-overlay__textarea {
        width: 100%;
        min-height: 160px;
        margin-top: 16px;
        padding: 14px 16px;
        border: 1px solid #2b3d59;
        border-radius: 18px;
        background: rgba(11, 18, 32, 0.92);
        color: #eef4ff;
        font: inherit;
        line-height: 1.5;
        resize: vertical;
      }

      .session-overlay__textarea:focus-visible {
        outline: 3px solid rgba(124, 198, 255, 0.4);
        outline-offset: 3px;
      }

      .session-overlay__helper {
        margin-top: 8px;
        color: #aab9d3;
        font-size: 0.95rem;
      }

      .session-overlay__support {
        margin-top: 20px;
        color: #aab9d3;
        font-size: 0.95rem;
      }

      .preferences-shell {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
      }

      .preferences-shell__launcher,
      .preferences-shell__button {
        min-width: 44px;
        min-height: 44px;
        padding: 12px 16px;
        border: 1px solid rgba(124, 198, 255, 0.2);
        border-radius: 16px;
        background: rgba(20, 32, 51, 0.92);
        color: #eef4ff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .preferences-shell__launcher:focus-visible,
      .preferences-shell__button:focus-visible,
      .preferences-shell__select:focus-visible,
      .preferences-shell__checkbox:focus-visible {
        outline: 3px solid rgba(124, 198, 255, 0.4);
        outline-offset: 3px;
      }

      .preferences-shell__panel {
        width: min(100vw - 32px, 420px);
        padding: 20px;
        border-radius: 22px;
        border: 1px solid rgba(124, 198, 255, 0.18);
        background: rgba(20, 32, 51, 0.96);
        box-shadow: 0 24px 64px rgba(5, 8, 16, 0.4);
      }

      .preferences-shell__panel--hidden {
        display: none;
      }

      .preferences-shell__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .preferences-shell__title {
        margin: 0;
        font-size: 1.2rem;
        line-height: 1.2;
      }

      .preferences-shell__body,
      .preferences-shell__support {
        margin: 14px 0 0;
        color: #d7e5fb;
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .preferences-shell__toggles {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .preferences-shell__toggle {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid rgba(124, 198, 255, 0.12);
        background: rgba(11, 18, 32, 0.88);
      }

      .preferences-shell__toggle--disabled {
        opacity: 0.65;
      }

      .preferences-shell__toggle-copy {
        display: grid;
        gap: 4px;
      }

      .preferences-shell__toggle-title {
        color: #eef4ff;
        font-weight: 600;
      }

      .preferences-shell__toggle-body {
        color: #aab9d3;
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .preferences-shell__checkbox {
        width: 20px;
        height: 20px;
        margin-top: 2px;
      }

      .preferences-shell__select {
        min-width: 156px;
        min-height: 44px;
        padding: 10px 12px;
        border: 1px solid rgba(124, 198, 255, 0.2);
        border-radius: 14px;
        background: rgba(11, 18, 32, 0.92);
        color: #eef4ff;
        font: inherit;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
